name: Build Chrome extension

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build shared package
        run: pnpm run build:shared

      - name: Prepare extension build
        run: pnpm --filter chrome-mcp-server exec wxt prepare

      - name: Build Chrome extension
        run: pnpm run build:extension

      - name: Verify stable extension identity
        run: node scripts/verify-extension-identity.mjs

      - name: Package unpacked extension
        run: |
          cd app/chrome-extension/.output/chrome-mv3
          zip -qr "$GITHUB_WORKSPACE/chrome-mcp-extension.zip" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mcp-extension-${{ github.sha }}
          path: chrome-mcp-extension.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: chrome-mcp-extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
